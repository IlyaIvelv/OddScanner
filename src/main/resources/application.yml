server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/oddscanner
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 13

jooq:
  sql-dialect: POSTGRES

oddscanner:
  refresh:
    global-seconds: 30
  bookmakers:
    fonbet:
      enabled: true
      base-url: https://www.fon.bet
      refresh-seconds: 30
    marathon:
      enabled: true
      base-url: https://www.marathonbet.ru
      refresh-seconds: 60
    thesportsdb:
      enabled: false
      base-url: https://www.thesportsdb.com
      refresh-seconds: 60
    betcity:
      enabled: true
      base-url: https://betcity.ru
      refresh-seconds: 30
      line-url: /ru/line/soccer
    ligastavok:
      enabled: true
      base-url: https://www.ligastavok.ru
      refresh-seconds: 60
  scanner:
    trigger-mode: SCHEDULED
    cron: "* * */1 * * *"
    debounce-ms: 1500
    min-profit-pct: 0.5
  normalization:
    team-similarity-threshold: 0.88
    start-time-window-min: 5

scheduler:
  enabled: true
  fixed-delay-ms: 300000

logging:
  level:
    com.oddscanner.bookmaker.fonbet: DEBUG
    com.oddscanner.bookmaker.betcity: DEBUG
    com.oddscanner.bookmaker.ligastavok: DEBUG
    com.microsoft.playwright: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html