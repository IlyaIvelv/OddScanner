spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/oddscanner
    username: user
    password: password
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: POSTGRES

parser:
  thread-pool-size: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: oddscanner