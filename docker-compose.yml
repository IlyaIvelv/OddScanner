version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: oddscanner-db
    environment:
      POSTGRES_DB: oddscanner
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_preload_libraries=pg_trgm"] # Важно для fuzzy search

volumes:
  pgdata: